name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm typecheck

            - run: pnpm lint

            - run: pnpm vitest run

            - run: pnpm build

    e2e:
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - run: pnpm exec playwright install chromium --with-deps

            - run: pnpm test:e2e
              env:
                  CI: true

    lighthouse:
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        continue-on-error: true

        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - run: pnpm dlx @lhci/cli autorun
